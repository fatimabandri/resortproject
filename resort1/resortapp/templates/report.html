{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <h2 class="text-center mb-4">Resort Reports</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h4>Total Rooms</h4>
                <h2>{{ total_rooms }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h4>Total Bookings</h4>
                <h2>{{ total_bookings }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h4>Total Revenue</h4>
                <h2>₹{{ total_revenue }}</h2>
            </div>
        </div>

    </div>

    <div class="row mt-4">

        <div class="col-md-6">
            <div class="card shadow p-4 text-center">
                <h4>Restaurant Orders</h4>
                <h2>{{ total_orders }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow p-4 text-center">
                <h4>Today's Bookings</h4>
                <h2>{{ today_bookings }}</h2>
                <p>Revenue: ₹{{ today_revenue }}</p>
            </div>
        </div>

    </div>
</div>

{% endblock %}
