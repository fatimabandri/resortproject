<!DOCTYPE html>
<html>

<head>
    <title>Luxury Resort</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 22px;
            color: cyan !important;
            letter-spacing: 1px;
        }

        .nav-link {
            color: white !important;
            margin-left: 15px;
            position: relative;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: cyan !important;
            text-shadow: 0 0 10px cyan;
        }

        /* Active underline animation */
        .nav-link::after {
            content: '';
            width: 0%;
            height: 2px;
            background: cyan;
            position: absolute;
            left: 0;
            bottom: 0;
            transition: 0.4s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Special Booking Button */
        .btn-book {
            background: cyan;
            color: black !important;
            font-weight: 600;
            border-radius: 30px;
            padding: 6px 18px;
            transition: 0.3s;
        }

        .btn-book:hover {
            background: white;
            box-shadow: 0 0 15px cyan;
        }

        /* Page container */
        .page-container {
            margin-top: 100px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">

            <a class="navbar-brand" href="{% url 'home' %}">
                🌴 Luxury Resort
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'rooms' %}">Rooms</a>
                    </li>

                    <!-- Dropdown -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Services
                        </a>
                        <ul class="dropdown-menu bg-dark">
                            <li><a class="dropdown-item text-white" href="{% url 'restaurant' %}">Restaurant</a></li>
                            <li><a class="dropdown-item text-white" href="{% url 'kitchen' %}">Kitchen</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'kitchen_dashboard' %}">
                            Kitchen Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'report' %}">Reports</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                    </li>

                    <!-- Booking Button -->
                    <li class="nav-item ms-3">
                        <a class="btn btn-book" href="{% url 'booking' %}">
                            Book Now
                        </a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <div class="container page-container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
