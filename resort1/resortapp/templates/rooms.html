{% extends 'base.html' %}
{% block content %}

<h2 class="text-center mb-4">Our Rooms</h2>

<div class="row">
    {% for room in rooms %}
    <div class="col-md-4 mb-4">
        <div class="card p-4 text-center">
            <h4>Room {{ room.room_number }}</h4>
            <p>Type: {{ room.room_type }}</p>
            <p>₹ {{ room.price }}</p>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
