{% extends 'base.html' %}
{% block content %}

<section class="hero-section d-flex align-items-center justify-content-center text-center text-white">
    <div class="overlay"></div>
    <div class="content">
        <h1 class="display-3 fw-bold">Luxury Resort</h1>
        <p class="lead">Experience Comfort, Elegance & Relaxation</p>
        <div class="mt-4">
            <a href="{% url 'booking' %}" class="btn btn-warning btn-lg me-3">Book Now</a>
            <a href="{% url 'rooms' %}" class="btn btn-outline-light btn-lg">View Rooms</a>
        </div>
    </div>
</section>

<section class="stats-section py-5 bg-light text-center">
    <div class="container">
        <div class="row">

            <div class="col-md-3">
                <div class="stat-box shadow p-4 rounded">
                    <h2>{{ total_rooms }}</h2>
                    <p>Total Rooms</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-box shadow p-4 rounded">
                    <h2>{{ available_rooms }}</h2>
                    <p>Available Rooms</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-box shadow p-4 rounded">
                    <h2>{{ booked_rooms }}</h2>
                    <p>Booked Rooms</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="stat-box shadow p-4 rounded">
                    <h2>{{ total_bookings }}</h2>
                    <p>Total Bookings</p>
                </div>
            </div>

        </div>
    </div>
</section>

{% endblock %}
